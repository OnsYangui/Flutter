name: oz_medical
description: MediAssist - Suivi médical personnel pour maladies chroniques

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.10.0
  cloud_firestore: ^5.6.0
  firebase_database: ^11.0.3
  firebase_auth: ^5.0.0

  path_provider: ^2.1.1
  
  # Crypto for password hashing
  crypto: ^3.0.3

  # ML Kit
  google_mlkit_commons: ^0.7.1
  google_mlkit_text_recognition: ^0.13.0
  google_mlkit_barcode_scanning: ^0.12.0
  google_mlkit_image_labeling: ^0.12.0
  google_mlkit_language_id: ^0.12.0
  google_mlkit_translation: ^0.11.0
  google_mlkit_entity_extraction: ^0.12.0

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.2
  fl_chart: ^0.66.0
  provider: ^6.1.1

  # Utils
  shared_preferences: ^2.2.2
  permission_handler: ^11.0.1
  image_picker: ^1.0.5
  camera: ^0.10.5
  intl: ^0.20.2

  # PDF & Sharing
  pdf: ^3.10.7
  printing: ^5.11.1
  share_plus: ^7.2.1



  # URL Launcher
  url_launcher: ^6.2.1

  # Geolocation
  geolocator: ^10.1.0

  # Haptic Feedback & Vibration
  vibration: ^2.0.0

  # Audio/Sound Effects
  audioplayers: ^6.0.0

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true


